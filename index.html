<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Project Showcase</title>
  <!-- Tailwind v4 CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @keyframes slow-pan {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
    .animate-bg {
      background-size: 200% 200%;
      animation: slow-pan 15s linear infinite alternate;
    }
  </style>
</head>
<body class="bg-[#050505] text-slate-200 min-h-screen font-sans selection:bg-purple-500/30 antialiased">

  <!-- Ambient Glowing Backgrounds -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-purple-900/15 blur-[140px] rounded-full"></div>
    <div class="absolute top-[30%] -right-[10%] w-[40%] h-[60%] bg-blue-900/10 blur-[140px] rounded-full"></div>
  </div>

  <main class="relative z-10 max-w-6xl mx-auto px-6 py-20">
    <!-- Header Section -->
    <header class="text-center mb-20">
      <h1 class="text-5xl md:text-6xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-purple-400 bg-clip-text text-transparent drop-shadow-sm">
        Selected Works
      </h1>
      <p class="mt-4 text-slate-400 text-lg font-light tracking-wide max-w-md mx-auto">
        A curated collection of web applications and full-stack architecture.
      </p>
    </header>

    <!-- Grid Container -->
    <div id="project-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Injected via JavaScript -->
    </div>

    <!-- Footer -->
    <footer class="mt-32 text-center border-t border-white/5 pt-8">
      <p class="text-slate-600 text-xs tracking-widest uppercase">Designed with focus & code.</p>
    </footer>
  </main>

  <script>
    const projects = [
      { 
        name: "Event Management System", 
        tech: ["React", "Tailwind", "JS"], 
        link: "https://emsmine.vercel.app/",
        type: "Frontend"
      },
      { 
        name: "Food Delivery App", 
        tech: ["MERN", "Tailwind"], 
        link: "https://foodie-2-frontend.vercel.app/",
        type: "Full Stack"
      },
      { 
        name: "E-commerce App", 
        tech: ["MERN", "Tailwind"], 
        link: "https://gupta-sales-frontend.vercel.app/",
        type: "Full Stack"
      }
    ];

    const gridContainer = document.getElementById('project-grid');

    gridContainer.innerHTML = projects.map(p => {
      // Determine badge colors based on stack type
      const isFullStack = p.type === "Full Stack";
      const typeBadgeStyle = isFullStack 
        ? "bg-purple-500/10 text-purple-400 border-purple-500/20" 
        : "bg-blue-500/10 text-blue-400 border-blue-500/20";

      // Render tags inside arrays beautifully
      const tagsHTML = p.tech.map(t => 
        `<span class="text-[10px] font-semibold tracking-wider uppercase px-2.5 py-1 bg-white/5 border border-white/10 rounded-md text-slate-300">${t}</span>`
      ).join('');

      return `
        <div onclick="window.open('${p.link}', '_blank')" class="group relative bg-[#0a0a0a] border border-white/5 p-8 rounded-3xl hover:border-purple-500/30 transition-all duration-500 hover:-translate-y-1.5 cursor-pointer flex flex-col justify-between min-h-[220px]">
          
          <!-- Card Backdrop Glow -->
          <div class="absolute inset-0 bg-gradient-to-b from-purple-500/[0.02] to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-3xl"></div>
          
          <div class="relative z-10">
            <!-- Header Row within Card -->
            <div class="flex items-center justify-between mb-4">
              <div class="flex flex-wrap gap-1.5">
                ${tagsHTML}
              </div>
              <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 border rounded-full ${typeBadgeStyle}">
                ${p.type}
              </span>
            </div>
            
            <!-- Project Title -->
            <h3 class="text-xl font-bold text-slate-100 group-hover:text-white transition-colors tracking-tight line-clamp-2">
              ${p.name}
            </h3>
          </div>
          
          <!-- Bottom Action Row -->
          <div class="relative z-10 mt-8 pt-4 border-t border-white/[0.02] flex items-center justify-between">
            <span class="inline-flex items-center gap-2 text-xs font-medium text-slate-400 group-hover:text-purple-400 transition-colors">
              Launch Application 
            </span>
            <div class="p-2 bg-white/5 rounded-xl border border-white/5 text-slate-400 group-hover:text-white group-hover:bg-purple-500/20 group-hover:border-purple-500/30 transition-all duration-300">
              <svg class="w-4 h-4 transition-transform group-hover:rotate-45" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5l15-15m0 0H8.25m11.25 0v11.25"/>
              </svg>
            </div>
          </div>

        </div>
      `;
    }).join('');
  </script>
</body>
</html>
